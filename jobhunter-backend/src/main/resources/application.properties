spring.application.name=jobhunter

# Kích hoạt profile secret để load biến bảo mật từ application-secret.properties (đã gitignore)
spring.profiles.include=secret

#config database
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/jobhunter
spring.datasource.username=root
# spring.datasource.password được load tử application-secret.properties (để bảo mật)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql: true


#config jwt
# hoangmelinh.jwt.base64-secret được load từ application-secret.properties

#expiration
hoangmelinh.jwt.access-token-validity-in-seconds=8640000
hoangmelinh.jwt.refresh-token-validity-in-seconds=8640000

#config upload file
##
#default = 1MB
spring.servlet.multipart.max-file-size=50MB

#default = 10 MB (form data)
spring.servlet.multipart.max-request-size=50MB
##

#base path

hoangmelinh.upload-file.base-uri=file:///E:/jobhunter-spring/upload/

#config pagination
spring.data.web.pageable.one-indexed-parameters=true

###config mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# spring.mail.username và spring.mail.password được load từ application-secret.properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
